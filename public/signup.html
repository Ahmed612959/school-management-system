<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>إنشاء حساب جديد - معهد رعاية الضبعية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #e8eef4 0%, #dce5f0 100%);
            min-height: 100vh;
            position: relative;
        }

        /* خلفية أنيقة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.03"><path fill="none" d="M20,20 L80,20 L80,80 L20,80 Z" stroke="%231a4f6e" stroke-width="1"/><circle cx="50" cy="50" r="15" stroke="%231a4f6e" stroke-width="1" fill="none"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: 0;
        }

        /* ====================== مؤشر الاتصال ====================== */
        .connection-status {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            transition: all 0.5s ease;
            opacity: 0;
            pointer-events: none;
        }

        .connection-status.show {
            opacity: 1;
        }

        .connection-status.testing {
            background: rgba(217, 119, 6, 0.95);
            color: white;
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.3);
        }

        .connection-status.success {
            background: rgba(45, 106, 79, 0.95);
            color: white;
            box-shadow: 0 4px 15px rgba(45, 106, 79, 0.3);
        }

        .connection-status.error {
            background: rgba(185, 28, 28, 0.95);
            color: white;
            box-shadow: 0 4px 15px rgba(185, 28, 28, 0.3);
        }

        .connection-status i {
            font-size: 1.1rem;
        }

        .connection-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .testing .connection-dot {
            background: #fbbf24;
        }

        .success .connection-dot {
            background: #4ade80;
            animation: none;
        }

        .error .connection-dot {
            background: #f87171;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* ====================== Header ====================== */
        .header {
            background: rgba(26, 79, 110, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid #c4a35a;
            padding: 3px;
            background: white;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .header h1 {
            font-size: 1.1rem;
            color: #c4a35a;
            font-weight: 700;
        }

        .login-btn {
            background: rgba(196, 163, 90, 0.2);
            color: #c4a35a;
            border: 1px solid #c4a35a;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .login-btn:hover {
            background: #c4a35a;
            color: #1a4f6e;
            transform: translateY(-2px);
        }

        /* ====================== Container ====================== */
        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 0 20px 60px;
            position: relative;
            z-index: 1;
        }

        /* ====================== Signup Card ====================== */
        .signup-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease;
        }

        .signup-card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            background: linear-gradient(135deg, #1a4f6e, #0d3b54);
            padding: 30px 25px 25px;
            text-align: center;
            position: relative;
        }

        .card-header .icon {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            border: 2px solid #c4a35a;
        }

        .card-header .icon i {
            font-size: 32px;
            color: #c4a35a;
        }

        .card-header h2 {
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .card-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
        }

        /* ====================== Form ====================== */
        .form-section {
            padding: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }

        .form-group {
            margin-bottom: 5px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1a2526;
            font-size: 0.85rem;
        }

        .form-group label i {
            color: #c4a35a;
            width: 18px;
            font-size: 0.9rem;
        }

        .form-group label .required {
            color: #b91c1c;
            font-size: 0.8rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.9rem;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #c4a35a;
            box-shadow: 0 0 0 4px rgba(196, 163, 90, 0.1);
        }

        .form-group input::placeholder {
            color: #aaa;
            font-size: 0.8rem;
        }

        .form-group small {
            color: #64748b;
            font-size: 0.7rem;
            margin-top: 5px;
            display: block;
        }

        .username-status {
            font-size: 0.75rem;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .username-status.available {
            color: #2d6a4f;
        }

        .username-status.unavailable {
            color: #b91c1c;
        }

        .username-status.checking {
            color: #d97706;
        }

        /* ====================== Submit Button ====================== */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #c4a35a, #b8933e);
            color: #1a4f6e;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(196, 163, 90, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ====================== Footer ====================== */
        .form-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        .form-footer p {
            color: #64748b;
            font-size: 0.85rem;
        }

        .form-footer a {
            color: #1a4f6e;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .form-footer a:hover {
            color: #c4a35a;
        }

        /* ====================== Main Footer ====================== */
        .main-footer {
            text-align: center;
            padding: 20px;
            color: #64748b;
            font-size: 0.75rem;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .main-footer .heart {
            color: #b91c1c;
        }

        /* ====================== Responsive ====================== */
        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .form-group.full-width {
                grid-column: span 1;
            }

            .container {
                margin: 20px auto;
                padding: 0 15px 80px;
            }

            .form-section {
                padding: 20px;
            }

            .card-header {
                padding: 25px 20px;
            }

            .card-header h2 {
                font-size: 1.3rem;
            }

            .header h1 {
                font-size: 0.85rem;
            }

            .login-btn {
                padding: 5px 12px;
                font-size: 0.75rem;
            }

            .connection-status {
                top: 70px;
                font-size: 0.8rem;
                padding: 8px 20px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 10px 15px;
            }

            .logo {
                width: 35px;
                height: 35px;
            }

            .card-header .icon {
                width: 55px;
                height: 55px;
            }

            .card-header .icon i {
                font-size: 25px;
            }
        }
    </style>
</head>
<body>

<!-- ====================== مؤشر الاتصال بالسيرفر ====================== -->
<div id="connectionStatus" class="connection-status">
    <span class="connection-dot"></span>
    <span id="connectionText">جاري الاتصال بالسيرفر...</span>
    <i id="connectionIcon" class="fas fa-spinner fa-spin"></i>
</div>

<header class="header">
    <div class="header-logo">
        <img src="logo.png" alt="شعار المعهد" class="logo" onerror="this.style.display='none'">
        <h1><i class="fas fa-graduation-cap"></i> معهد رعاية الضبعية</h1>
    </div>
    <a href="login.html" class="login-btn">
        <i class="fas fa-sign-in-alt"></i>
        <span>تسجيل الدخول</span>
    </a>
</header>

<div class="container">
    <div class="signup-card">
        <div class="card-header">
            <div class="icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h2>إنشاء حساب جديد</h2>
            <p>سجل بياناتك للانضمام إلى منصة التعلم</p>
        </div>

        <div class="form-section">
            <form id="signupForm">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label><i class="fas fa-user"></i> الاسم الكامل <span class="required">*</span></label>
                        <input type="text" id="fullName" placeholder="مثال: أحمد محمد علي السيد" required>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-at"></i> اسم المستخدم <span class="required">*</span></label>
                        <input type="text" id="username" placeholder="3-20 حرف (أحرف وأرقام)" required>
                        <div id="usernameStatus" class="username-status"></div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> كلمة المرور <span class="required">*</span></label>
                        <input type="password" id="password" placeholder="أدخل كلمة مرور قوية" required>
                        <small>يجب أن تكون 6 أحرف على الأقل</small>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-chalkboard-user"></i> الصف الدراسي <span class="required">*</span></label>
                        <select id="grade" required>
                            <option value="first">🎓 الصف الأول الثانوي</option>
                            <option value="second">📚 الصف الثاني الثانوي</option>
                            <option value="third">📖 الصف الثالث الثانوي</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-id-card"></i> اخر 7 ارقام من البطاقة او شهادة الميلاد <span class="required">*</span></label>
                        <input type="text" id="studentCode" maxlength="7" placeholder="آخر 7 أرقام من البطاقة" required>
                        <small>آخر 7 أرقام من بطاقة الطالب أو شهادة الميلاد</small>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-phone-alt"></i> رقم الهاتف <span class="required">*</span></label>
                        <input type="tel" id="phone" placeholder="01012345678" required>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-user-friends"></i> ولي الأمر <span class="required">*</span></label>
                        <input type="text" id="parentName" placeholder="اسم الأب أو الأم رباعي" required>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-id-card"></i> رقم بطاقة ولي الأمر <span class="required">*</span></label>
                        <input type="text" id="parentId" maxlength="14" placeholder="14 رقم" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                        <small>رقم بطاقة ولي الأمر (14 رقم)</small>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <i class="fas fa-user-plus"></i>
                    إنشاء الحساب
                </button>

                <div class="form-footer">
                    <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
                </div>
            </form>
        </div>
    </div>
</div>

<footer class="main-footer">
    <p>Developed by Ahmed Mousa <span class="heart">❤</span></p>
</footer>

<script src="signup.js"></script>
</body>
</html>
